version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  jobs:
    pre_install:
      - pip install torch torchvision torchaudio
      - pip install git+https://github.com/lvis-dataset/lvis-api.git@lvis_challenge_2021 --no-build-isolation

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

python:
  install:
    - path: .
      extra_requirements:
        - optional
        - doc
